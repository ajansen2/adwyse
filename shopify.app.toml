# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e84f4a7fecd1e8c9c05791a35c0336d4"
name = "AdWyse"
application_url = "https://adwyse.ca"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,read_customers"
optional_scopes = []
use_legacy_install_flow = false

[auth]
redirect_urls = ["https://adwyse.ca/api/auth/shopify/callback"]

[webhooks]
api_version = "2024-10"

# Mandatory compliance webhooks (REQUIRED for App Store)
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "https://adwyse.ca/api/webhooks/compliance"

# Order tracking webhook for attribution
[[webhooks.subscriptions]]
topics = ["orders/create"]
uri = "https://adwyse.ca/api/webhooks/orders"

# App uninstall webhook
[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "https://adwyse.ca/api/webhooks/uninstall"

[pos]
embedded = false
